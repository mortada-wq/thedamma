openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: songs
    description: Song metadata operations
  - name: admin
    description: Admin configuration
  - name: auth
    description: Authentication
  - name: projects
    description: User projects
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /songs:
    get:
      operationId: listSongs
      tags: [songs]
      summary: List all songs
      description: Returns every song with full metadata, newest first
      responses:
        "200":
          description: A list of songs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Song"
    post:
      operationId: generateSong
      tags: [songs]
      summary: Generate metadata for a song
      description: Accepts a YouTube link or song name and generates full structured metadata using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongInput"
      responses:
        "201":
          description: Song created with generated metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /songs/stats:
    get:
      operationId: getSongStats
      tags: [songs]
      summary: Library statistics
      description: Aggregate counts across the song library for the dashboard
      responses:
        "200":
          description: Library statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongStats"
  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get current AI provider settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"
    put:
      operationId: updateAdminSettings
      tags: [admin]
      summary: Update AI provider settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"
  /songs/export:
    get:
      operationId: exportAllSongs
      tags: [songs]
      summary: Export the entire library as one RAG file
      description: Returns a single combined JSON document containing every song's metadata
      responses:
        "200":
          description: Combined RAG export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagExport"
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthBody"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /projects/public:
    get:
      operationId: getPublicProjects
      tags: [projects]
      summary: Public project gallery (6 newest public projects)
      responses:
        "200":
          description: Public projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicProject"
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List my projects
      responses:
        "200":
          description: My projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectSummary"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"
  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project with entries
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project with entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: patchProject
      tags: [projects]
      summary: Update project title or visibility
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectPatch"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "204":
          description: Deleted
  /projects/{projectId}/entries:
    post:
      operationId: createEntry
      tags: [projects]
      summary: Add an entry to a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewEntryInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
  /projects/{projectId}/entries/{entryId}:
    delete:
      operationId: deleteEntry
      tags: [projects]
      summary: Delete an entry
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /projects/{projectId}/export:
    get:
      operationId: exportProject
      tags: [projects]
      summary: Export project as JSON
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project export
          content:
            application/json:
              schema:
                type: object
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
  /admin/users/invite:
    post:
      operationId: inviteUser
      tags: [admin]
      summary: Invite a user by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteInput"
      responses:
        "201":
          description: Invited user with temporary password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitedUser"
  /admin/users/{userId}:
    patch:
      operationId: patchUser
      tags: [admin]
      summary: Approve or change user role
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
    delete:
      operationId: deleteUser
      tags: [admin]
      summary: Delete a user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Deleted
  /songs/{id}:
    get:
      operationId: getSong
      tags: [songs]
      summary: Get a single song
      parameters:
        - $ref: "#/components/parameters/SongId"
      responses:
        "200":
          description: The song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateSong
      tags: [songs]
      summary: Update a song's fields or metadata
      parameters:
        - $ref: "#/components/parameters/SongId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongUpdate"
      responses:
        "200":
          description: Updated song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteSong
      tags: [songs]
      summary: Delete a song
      parameters:
        - $ref: "#/components/parameters/SongId"
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  parameters:
    SongId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    TrackSegment:
      type: object
      description: A single interval in the detailed track breakdown
      properties:
        timestamp:
          type: string
          description: Start time of this interval, e.g. "0:00" or "1:24"
        label:
          type: string
          description: Section name, e.g. "Intro", "Verse 1", "Chorus", "Instrumental break"
        instruments:
          type: array
          items:
            type: string
          description: Instruments active during this interval
        vocals:
          type: string
          description: Vocal description for this interval (which voices, harmony, solo, etc.)
        notes:
          type: string
          description: Musical notes — key, tempo, mode, melodic motion, dynamics
      required:
        - timestamp
        - label
        - instruments
        - vocals
        - notes
    SongMetadata:
      type: object
      description: Full structured musicological metadata for a song
      properties:
        title:
          type: string
        singer:
          type: string
          description: Performing singer(s)
        composer:
          type: string
        era:
          type: string
          description: Time period / musical era
        geography:
          type: string
          description: Region or country of origin
        history:
          type: string
          description: Historical and cultural background
        subject:
          type: string
          description: Main theme or subject of the song
        relatedSubjects:
          type: array
          items:
            type: string
        dialect:
          type: string
          description: Language and dialect of the lyrics
        instruments:
          type: array
          items:
            type: string
          description: All instruments used
        voices:
          type: array
          items:
            type: string
          description: All distinct voices / vocal parts
        relatedWorks:
          type: array
          items:
            type: string
        transcription:
          type: string
          description: Full lyric transcription
        pronunciationNotes:
          type: string
          description: Detailed notes on how to pronounce the lyrics
        track:
          type: array
          items:
            $ref: "#/components/schemas/TrackSegment"
          description: Interval-by-interval breakdown of the music
      required:
        - title
        - singer
        - composer
        - era
        - geography
        - history
        - subject
        - relatedSubjects
        - dialect
        - instruments
        - voices
        - relatedWorks
        - transcription
        - pronunciationNotes
        - track
    Song:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        singer:
          type: string
        era:
          type: string
        geography:
          type: string
        inputType:
          type: string
          enum: [youtube, name, file]
        inputValue:
          type: string
        metadata:
          $ref: "#/components/schemas/SongMetadata"
        createdAt:
          type: string
      required:
        - id
        - title
        - singer
        - era
        - geography
        - inputType
        - inputValue
        - metadata
        - createdAt
    SongInput:
      type: object
      properties:
        input:
          type: string
          minLength: 1
          description: A YouTube link or the name of a song
      required:
        - input
    SongUpdate:
      type: object
      description: Partial update for a song — supply any combination of top-level fields and/or full metadata
      properties:
        title:
          type: string
        singer:
          type: string
        era:
          type: string
        geography:
          type: string
        metadata:
          $ref: "#/components/schemas/SongMetadata"
    StatCount:
      type: object
      properties:
        label:
          type: string
        count:
          type: integer
      required:
        - label
        - count
    SongStats:
      type: object
      properties:
        total:
          type: integer
        byEra:
          type: array
          items:
            $ref: "#/components/schemas/StatCount"
        byGeography:
          type: array
          items:
            $ref: "#/components/schemas/StatCount"
        byDialect:
          type: array
          items:
            $ref: "#/components/schemas/StatCount"
      required:
        - total
        - byEra
        - byGeography
        - byDialect
    RagExport:
      type: object
      properties:
        generatedAt:
          type: string
        count:
          type: integer
        songs:
          type: array
          items:
            $ref: "#/components/schemas/Song"
      required:
        - generatedAt
        - count
        - songs
    AdminSettings:
      type: object
      properties:
        activeProvider:
          type: string
          enum: [gemini, claude, deepseek, siliconflow, flamingo]
        activeModel:
          type: string
      required:
        - activeProvider
        - activeModel
    AuthBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]
    AuthUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [pending, user, admin]
      required: [id, email, role]
    AdminUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [pending, user, admin]
        createdAt:
          type: string
      required: [id, email, role, createdAt]
    InvitedUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
        tempPassword:
          type: string
      required: [id, email, role, tempPassword]
    PublicProject:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        summary:
          type: string
          nullable: true
        createdAt:
          type: string
        ownerEmail:
          type: string
        entryCount:
          type: integer
      required: [id, title, category, createdAt, ownerEmail, entryCount]
    ProjectSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        provider:
          type: string
        summary:
          type: string
          nullable: true
        isPublic:
          type: boolean
        createdAt:
          type: string
        entryCount:
          type: integer
      required: [id, title, category, provider, isPublic, createdAt, entryCount]
    NewProjectInput:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
          enum: [rag-dataset, fine-tune, document, other]
        provider:
          type: string
      required: [title, category, provider]
    ProjectPatch:
      type: object
      properties:
        title:
          type: string
        isPublic:
          type: boolean
    NewEntryInput:
      type: object
      properties:
        inputUrl:
          type: string
      required: [inputUrl]
    InviteInput:
      type: object
      properties:
        email:
          type: string
      required: [email]
    UserRoleInput:
      type: object
      properties:
        role:
          type: string
          enum: [pending, user, admin]
      required: [role]
    EntryDescription:
      type: object
      properties:
        label:
          type: string
        text:
          type: string
      required: [label, text]
    Entry:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        inputUrl:
          type: string
        aiQuestion:
          type: string
          nullable: true
        descriptions:
          type: array
          items:
            $ref: "#/components/schemas/EntryDescription"
        createdAt:
          type: string
      required: [id, projectId, inputUrl, descriptions, createdAt]
    ProjectDetail:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        provider:
          type: string
        summary:
          type: string
          nullable: true
        isPublic:
          type: boolean
        createdAt:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/Entry"
      required: [id, title, category, provider, isPublic, createdAt, entries]
